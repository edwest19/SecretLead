name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish self-contained
        run: >
          dotnet publish SecretLead.csproj
          -c Release -r win-x64 
          -o publish

      - name: Zip output
        run: Compress-Archive -Path publish\* -DestinationPath SecretLead-win-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SecretLead-win-x64.zip
          generate_release_notes: true
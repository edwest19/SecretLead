name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest   # WinUI 3 / Windows App SDK needs a Windows runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SecretLead\SecretLead.csproj

      - name: Build
        run: dotnet build SecretLead\SecretLead.csproj -c Release --no-restore